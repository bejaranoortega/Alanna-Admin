<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Admin simple</title>
<style>
body { font-family: Arial; background:#f0f0f0; text-align:center; }
.carpeta { border:1px solid #333; margin:10px; padding:10px; background:#fff; }
.carpeta img { width:80px; height:80px; object-fit:cover; margin:5px; }
</style>
</head>
<body>
<h1>ADMIN</h1>

<input type="text" id="nombreCarpeta" placeholder="Nombre carpeta">
<button onclick="crearCarpeta()">Crear carpeta</button>

<div id="lista"></div>

<script>
let carpetas = JSON.parse(localStorage.getItem("carpetas")) || [];

function crearCarpeta() {
  let nombre = document.getElementById("nombreCarpeta").value.trim();
  if (!nombre) { alert("Escribe un nombre"); return; }
  carpetas.push({ nombre:nombre, imagenes:[] });
  document.getElementById("nombreCarpeta").value="";
  guardar();
}

function borrarCarpeta(i) {
  carpetas.splice(i,1);
  guardar();
}

function cambiarNombre(i,nuevo) {
  carpetas[i].nombre=nuevo;
  guardar();
}

function subirImagen(e,i) {
  Array.from(e.target.files).forEach(file=>{
    let reader=new FileReader();
    reader.onload=ev=>{
      carpetas[i].imagenes.push(ev.target.result);
      guardar();
    };
    reader.readAsDataURL(file);
  });
}

function borrarImagen(i,j) {
  carpetas[i].imagenes.splice(j,1);
  guardar();
}

function guardar() {
  localStorage.setItem("carpetas",JSON.stringify(carpetas));
  render();
}

function render() {
  let lista=document.getElementById("lista");
  lista.innerHTML="";
  carpetas.forEach((c,i)=>{
    let div=document.createElement("div");
    div.className="carpeta";
    let imagenesHTML="";
    c.imagenes.forEach((img,j)=>{
      imagenesHTML+=`<div><img src="${img}"><button onclick="borrarImagen(${i},${j})">Eliminar imagen</button></div>`;
    });
    div.innerHTML=`
      <input value="${c.nombre}" onchange="cambiarNombre(${i},this.value)">
      <br>
      <input type="file" multiple onchange="subirImagen(event,${i})">
      <button onclick="borrarCarpeta(${i})">Eliminar carpeta</button>
      <div>${imagenesHTML}</div>
    `;
    lista.appendChild(div);
  });
}

render();
</script>
</body>
</html>
